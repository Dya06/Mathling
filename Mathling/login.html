<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mathlings</title>
  <meta name="description" content="Log in or create your Mathlings account to start your abacus learning journey.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Minimal Nav -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <img src="favicon.svg" alt="Mathlings" class="navbar-logo">
        <span class="navbar-title">Math<span>lings</span></span>
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
      </div>
    </div>
  </nav>

  <main class="auth-page main">
    <div class="auth-container">
      <div class="auth-header">
        <h1 id="auth-title">Welcome Back!</h1>
        <p id="auth-subtitle">Log in to continue your learning adventure</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Log In</button>
        <button class="auth-tab" data-mode="register">Register</button>
      </div>

      <div class="auth-card" id="auth-form">
        <!-- Login Form -->
        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Log In</button>
        </form>

        <!-- Register Form (hidden) -->
        <form id="register-form" style="display:none">
          <div class="form-group">
            <label class="form-label" for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="form-input" placeholder="Enter your name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input type="email" id="reg-email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-input" placeholder="Create a password" required>
          </div>
          <input type="hidden" id="selected-role" value="">
          <div class="role-selector">
            <label class="form-label">I am a...</label>
            <div class="role-grid">
              <div class="role-option" data-role="student">
                <span class="role-emoji">🧒</span>
                <span class="role-name">Student</span>
              </div>
              <div class="role-option" data-role="parent">
                <span class="role-emoji">👩</span>
                <span class="role-name">Parent</span>
              </div>
              <div class="role-option" data-role="instructor">
                <span class="role-emoji">👨‍🏫</span>
                <span class="role-name">Instructor</span>
              </div>
              <div class="role-option" data-role="admin">
                <span class="role-emoji">🛡️</span>
                <span class="role-name">Admin</span>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Create Account</button>
        </form>
      </div>

      <!-- Demo Accounts -->
      <div class="demo-accounts">
        <h4>🎮 Try Demo Accounts</h4>
        <div class="demo-account">
          <span class="demo-role">Student</span>
          <span>student@demo.com</span>
          <button class="demo-fill" onclick="fillDemo('student@demo.com','demo123')">Fill</button>
        </div>
        <div class="demo-account">
          <span class="demo-role">Parent</span>
          <span>parent@demo.com</span>
          <button class="demo-fill" onclick="fillDemo('parent@demo.com','demo123')">Fill</button>
        </div>
        <div class="demo-account">
          <span class="demo-role">Instructor</span>
          <span>instructor@demo.com</span>
          <button class="demo-fill" onclick="fillDemo('instructor@demo.com','demo123')">Fill</button>
        </div>
        <div class="demo-account">
          <span class="demo-role">Admin</span>
          <span>admin@demo.com</span>
          <button class="demo-fill" onclick="fillDemo('admin@demo.com','demo123')">Fill</button>
        </div>
      </div>

      <div class="auth-footer">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function fillDemo(email, password) {
      // Switch to login tab
      document.querySelector('[data-mode="login"]').click();
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = password;
      App.showToast('Demo credentials filled! Click Log In.', 'info');
    }
  </script>
</body>
</html>
